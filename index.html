<!DOCTYPE html>
<html lang="fr" style="height: 100%;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte des lieux d'inclusion numérique</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; }
        #map { height: 100%; width: 100%; }
        .legend { background: white; padding: 10px; border-radius: 5px; box-shadow: 0 0 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script>
        console.log("Initialisation de la carte...");
        const map = L.map('map').setView([44.837789, -0.57918], 13);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        const csvUrl = 'RAW_met_lieux_inclusion_numerique.csv';

        Papa.parse(csvUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                console.log("Fichier CSV chargé avec succès.");
                console.log("Lignes brutes :", results.data.length);
                
                const markers = [];
                
                results.data.forEach((row, index) => {
                    // Nettoyage des clés (BOM, espaces)
                    const cleanRow = {};
                    for (let key in row) {
                        const cleanKey = key.trim().replace(/^\uFEFF/, "");
                        cleanRow[cleanKey] = row[key];
                    }

                    let lat = parseFloat(cleanRow.latitude);
                    let lng = parseFloat(cleanRow.longitude);

                    // Si lat/lng ne sont pas des nombres, on tente geo_point
                    if ((isNaN(lat) || isNaN(lng)) && cleanRow.geo_point) {
                        const parts = cleanRow.geo_point.split(/[,;]/);
                        if (parts.length >= 2) {
                            lat = parseFloat(parts[0].trim());
                            lng = parseFloat(parts[1].trim());
                        }
                    }

                    if (!isNaN(lat) && !isNaN(lng)) {
                        const marker = L.marker([lat, lng])
                            .bindPopup(`
                                <strong>${cleanRow.nom || 'Sans nom'}</strong><br>
                                ${cleanRow.structure_porteuse ? '<em>' + cleanRow.structure_porteuse + '</em><br>' : ''}
                                ${cleanRow.adresse_brut || ''}<br>
                                <br>
                                <small>${cleanRow.type_lieu || ''}</small>
                            `);
                        markers.push(marker);
                        marker.addTo(map);
                    }
                });

                console.log("Marqueurs valides ajoutés :", markers.length);

                if (markers.length > 0) {
                    const group = new L.featureGroup(markers);
                    map.fitBounds(group.getBounds().pad(0.1));
                } else {
                    console.error("Aucune coordonnée valide trouvée.");
                    alert("Attention : Le fichier CSV a été lu mais aucun point n'a pu être placé sur la carte. Vérifiez les colonnes 'latitude' et 'longitude'.");
                }
            },
            error: function(err) {
                console.error("Erreur lors du téléchargement du CSV :", err);
                alert("Impossible de charger le fichier CSV (" + csvUrl + "). Vérifiez qu'il est bien présent sur GitHub.");
            }
        });
    </script>
</body>
</html>
